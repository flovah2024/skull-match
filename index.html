    for(let c=Math.max(0,cc-1);c<=Math.min(C-1,cc+1);c++){
      const t=board[r][c];if(!t)continue;
      if(t.type==='skull'){t.hp-=G.wDmg*5;if(t.hp<=0){G.kills++;}}
      rem.add(`${r},${c}`);
    }
  await animRem(rem);
  for(const k of rem){const[r,c]=k.split(',').map(Number);board[r][c]=null;}
  await collapse();msg(T('skMsgFireball'));
}
async function skFrostNova(){
  let ct=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type==='skull'){board[r][c].wait=(board[r][c].wait||0)+2;board[r][c].hp-=2;ct++;refreshCell(r,c);}
  }
  G.frozen=true;screenFx('rgba(100,200,255,.15)',500);msg(T('skMsgFrostNova'));
}
async function skArcaneShift(){
  G.skills.forEach(s=>{if(s.cd>0)s.cd=Math.max(0,s.cd-3);});
  rsk();
  const rem=new Set();
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='potion')rem.add(`${r},${c}`);}
  for(const k of rem){const[r,c]=k.split(',').map(Number);G.hp=Math.min(G.maxHp,G.hp+G.hpPP);board[r][c]=null;}
  await animRem(rem);await collapse();msg(T('skMsgArcaneShift'));
}
async function skManaShield(){
  const shield=Math.floor(G.maxHp*.3);G.armor=Math.min(G.maxArmor,G.armor+shield);
  screenFx('rgba(160,100,220,.12)',400);msg(T('skMsgManaShield'));
}
// --- ROGUE ---
async function skSnipe(){
  const skulls=[];
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='skull')skulls.push({r,c});}
  skulls.sort((a,b)=>board[a.r][a.c].hp-board[b.r][b.c].hp);
  const rem=new Set();const targets=skulls.slice(0,2);
  for(const t of targets){board[t.r][t.c].hp-=G.wDmg*6;if(board[t.r][t.c].hp<=0){G.kills++;rem.add(`${t.r},${t.c}`);}}
  await animRem(rem);
  for(const k of rem){const[r,c]=k.split(',').map(Number);board[r][c]=null;}
  for(const t of targets){if(board[t.r]?.[t.c]?.type==='skull'&&board[t.r][t.c].hp>0)refreshCell(t.r,t.c);}
  await collapse();msg(T('skMsgSnipe'));
}
async function skLootStorm(){
  let ct=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type!=='skull'&&board[r][c]?.type!=='coin'&&Math.random()<.4){
      board[r][c]={type:'coin',r,c,_id:++uid};refreshCell(r,c);ct++;
    }
  }
  const rem=new Set();
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='coin'){rem.add(`${r},${c}`);G.gold+=3;G.totGold+=3;}}
  await animRem(rem);
  for(const k of rem){const[r,c]=k.split(',').map(Number);board[r][c]=null;}
  await collapse();msg(T('skMsgLootStorm'));
}
async function skShadowStep(){
  const rem=new Set();
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type==='skull'&&board[r][c].spec){
      board[r][c].hp-=G.wDmg*8;if(board[r][c].hp<=0){G.kills++;rem.add(`${r},${c}`);}
    }
  }
  G.lck+=1;rc();
  await animRem(rem);
  for(const k of rem){const[r,c]=k.split(',').map(Number);board[r][c]=null;}
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='skull'&&board[r][c].hp>0)refreshCell(r,c);}
  await collapse();msg(T('skMsgShadowStep'));
}
async function skPoisonTrap(){
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type==='skull'){board[r][c].hp-=2;board[r][c].atk=Math.max(0,board[r][c].atk-1);refreshCell(r,c);}
  }
  G.poisonStacks=Math.max(G.poisonStacks,0);
  screenFx('rgba(80,200,50,.12)',400);msg(T('skMsgPoisonTrap'));
}

// ================================================================
//  ULTIMATE SKILLS
// ================================================================
async function useUltimate(){
  if(busy||!G.ultReady)return;
  busy=true;G.ultReady=false;G.mana=0;
  SFX.skill();
  try{
    screenFx('rgba(140,80,255,.15)',500);
    if(G.cls==='warrior')await ultWarrior();
    else if(G.cls==='mage')await ultMage();
    else await ultRogue();
    rsk();ui();
  }catch(e){console.error('Ultimate error:',e);}finally{busy=false;}
}
async function ultWarrior(){
  // DMG all skulls + full armor
  const dmg=G.wDmg*3+G.str*2;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type==='skull'){
      board[r][c].hp-=dmg;
      const e=tEl(r,c);if(e)e.classList.add('a-slash');
    }
  }
  G.armor=G.maxArmor;
  framePulse('a-skill',400);
  msg(T('ultMsgWarrior'));
  await sl(400);
  // Kill dead skulls
  const rem=new Set();
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='skull'&&board[r][c].hp<=0){rem.add(`${r},${c}`);G.kills++;}}
  if(rem.size>0){await animRem(rem,'a-kill');for(const k of rem){const[rr,cc]=k.split(',').map(Number);board[rr][cc]=null;}await collapse();}
}
async function ultMage(){
  // Board-wide blast + reset all skill CD
  const dmg=G.wDmg*4+G.dex*3;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    if(board[r][c]?.type==='skull'){
      board[r][c].hp-=dmg;
      const e=tEl(r,c);if(e){e.classList.add('a-kill');}
    }
  }
  G.skills.forEach(s=>{s.cd=0;});
  framePulse('a-skill',500);
  msg(T('ultMsgMage'));
  await sl(500);
  const rem=new Set();
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]?.type==='skull'&&board[r][c].hp<=0){rem.add(`${r},${c}`);G.kills++;}}
  if(rem.size>0){await animRem(rem,'a-kill');for(const k of rem){const[rr,cc]=k.split(',').map(Number);board[rr][cc]=null;}await collapse();}
}
async function ultRogue(){
  // Instant kill strongest skull + bonus gold
  let strongest=null,maxPow=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const t=board[r][c];
    if(t?.type==='skull'){const pow=t.atk+t.def+t.hp;if(pow>maxPow){maxPow=pow;strongest={r,c};}}
  }
  if(strongest){
    const e=tEl(strongest.r,strongest.c);if(e)e.classList.add('a-kill');
    await sl(400);
    board[strongest.r][strongest.c]=null;G.kills++;
    await collapse();
  }
  // Bonus gold
  const bonus=20+G.lck*5;
  G.gold+=bonus;G.totGold+=bonus;
  msg(T('ultMsgRogue'));
}

// ================================================================
//  GAME OVER
// ================================================================
function gameOver(){
  SFX.gameOver();BGM.stop();
  haptic(50);
  screenFx('rgba(255,0,0,.12)',400);
  setTimeout(()=>screenFx('rgba(0,0,0,.15)',500),400);
  const finalScore=calcScore();
  const isNewBest=finalScore>bestScore;
  if(isNewBest){bestScore=finalScore;try{localStorage.setItem('dr_best',bestScore);}catch(e){}}
  let goHTML=`
    <b>${T('goScore')}:</b> ${finalScore}${isNewBest?' · '+T('goNewBest'):''}<br>
    <b>${T('goClass')}:</b> ${CLASSES.find(c=>c.id===G.cls).name} · <b>${T('goLv')}:</b> ${G.level} · <b>${T('goTurn')}:</b> ${G.turn}<br>
    <b>${T('goKills')}:</b> ${G.kills} · <b>${T('goMaxCombo')}:</b> ${G.maxCombo||0}<br>
    <b>${T('goWeapon')}:</b> ${WNAMES()[G.wTier]} · <b>${T('goArmor')}:</b> ${ANAMES()[G.aTier]}
  `;
  if(isNewBest){
    goHTML+=`<div id="ini-input">
      <div class="ini-label">${T("tutLabel")}</div>
      <div class="ini-slots">
        <div class="ini-col" id="ini-col0"><div class="ini-arr" onclick="iniPrev(0)">▲</div><span class="ini-char" id="ic0">A</span><div class="ini-arr" onclick="iniNext(0)">▼</div></div>
        <div class="ini-col" id="ini-col1"><div class="ini-arr" onclick="iniPrev(1)">▲</div><span class="ini-char" id="ic1">A</span><div class="ini-arr" onclick="iniNext(1)">▼</div></div>
        <div class="ini-col" id="ini-col2"><div class="ini-arr" onclick="iniPrev(2)">▲</div><span class="ini-char" id="ic2">A</span><div class="ini-arr" onclick="iniNext(2)">▼</div></div>
      </div>
      <div class="ini-ok" onclick="saveInitials()">OK</div>
    </div>`;
  }
  document.getElementById('go-st').innerHTML=goHTML;
  setTimeout(()=>document.getElementById('scr-over').classList.add('show'),600);
}


// ================================================================
//  INITIALS INPUT
// ================================================================
const _iniChars='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let _ini=[0,0,0];
function iniNext(slot){
  _ini[slot]=(_ini[slot]+1)%_iniChars.length;
  const el=document.getElementById('ic'+slot);
  el.textContent=_iniChars[_ini[slot]];
  el.classList.remove('ini-slide-up','ini-slide-down');
  void el.offsetWidth;
  el.classList.add('ini-slide-up');
  SFX.click();
}
function iniPrev(slot){
  _ini[slot]=(_ini[slot]-1+_iniChars.length)%_iniChars.length;
  const el=document.getElementById('ic'+slot);
  el.textContent=_iniChars[_ini[slot]];
  el.classList.remove('ini-slide-up','ini-slide-down');
  void el.offsetWidth;
  el.classList.add('ini-slide-down');
  SFX.click();
}
// Touch swipe support for initials
(function(){
  let _touchSlot=-1,_touchY=0;
  const THRESHOLD=20;
  document.addEventListener('touchstart',function(e){
    const t=e.target.closest('.ini-col');
    if(!t)return;
    const id=t.id;
    if(!id)return;
    _touchSlot=parseInt(id.replace('ini-col',''));
    _touchY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(_touchSlot<0)return;
    const dy=e.touches[0].clientY-_touchY;
    if(Math.abs(dy)>=THRESHOLD){
      if(dy<0)iniNext(_touchSlot); else iniPrev(_touchSlot);
      _touchY=e.touches[0].clientY;
    }
  },{passive:true});
  document.addEventListener('touchend',function(){_touchSlot=-1;},{passive:true});
})();
function saveInitials(){
  bestInitials=_iniChars[_ini[0]]+_iniChars[_ini[1]]+_iniChars[_ini[2]];
  try{localStorage.setItem('dr_ini',bestInitials);}catch(e){}
  document.getElementById('v-ini').textContent=bestInitials;
  document.getElementById('v-best').textContent=bestScore;
  const el=document.getElementById('ini-input');
  if(el)el.innerHTML='<div style="color:var(--sv-hi);font-size:14px;margin-top:8px;">'+T('iniSaved',bestInitials)+'</div>';
  SFX.levelUp();
}

// ================================================================
//  UTILITY
// ================================================================
function sl(ms){return new Promise(r=>setTimeout(r,ms));}
function msg(t){document.getElementById('msg').innerHTML=t;}
let _fltY=0;
function flt(pos,text,color,sizeClass){
  const e=tEl(pos.r,pos.c);if(!e)return;
  const frame=document.getElementById('board-frame');
  const fr=frame.getBoundingClientRect();
  const er=e.getBoundingClientRect();
  const f=document.createElement('div');f.className='ft'+(sizeClass?' '+sizeClass:'');f.textContent=text;f.style.color=color;
  const x=er.left+er.width/2-fr.left;
  const y=er.top-fr.top-4-(_fltY*18);
  f.style.left=x+'px';f.style.top=Math.max(4,y)+'px';
  frame.appendChild(f);
  _fltY++;
  setTimeout(()=>{if(f.parentNode)f.remove();_fltY=Math.max(0,_fltY-1);},2000);
}
// === iOS-compatible touch/pointer input on board ===
function getTileAt(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el)return null;
  const tile=el.closest('.tile');
  if(!tile)return null;
  const r=parseInt(tile.dataset.r),c=parseInt(tile.dataset.c);
  if(isNaN(r)||isNaN(c))return null;
  return{r,c};
}
const boardEl=document.getElementById('board-frame');
boardEl.addEventListener('touchstart',e=>{
  if(busy)return;
  const t=e.touches[0];
  const p=getTileAt(t.clientX,t.clientY);
  if(p)onD(p.r,p.c);
},{passive:false});
boardEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!drag)return;
  const t=e.touches[0];
  const p=getTileAt(t.clientX,t.clientY);
  if(p)onE(p.r,p.c);
},{passive:false});
boardEl.addEventListener('touchend',e=>{
  if(drag)onU();
},{passive:false});
boardEl.addEventListener('touchcancel',e=>{
  if(drag)onU();
},{passive:false});
// Mouse fallback for desktop
boardEl.addEventListener('mousemove',e=>{
  if(!drag)return;
  const p=getTileAt(e.clientX,e.clientY);
  if(p)onE(p.r,p.c);
});
document.addEventListener('mouseup',e=>{if(drag)onU();});
// === iOS gesture prevention ===
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.getElementById('root').addEventListener('touchmove',e=>{
  if(!e.target.closest('.mbox'))e.preventDefault();
},{passive:false});
// Prevent double-tap zoom
let lastTap=0;document.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<300&&!e.target.closest('.mbox,.mbg,.cbtn,.rbtn,.dbtn,.cls-btn'))e.preventDefault();lastTap=now;},false);
document.body.style.overscrollBehavior='none';
// ESC key to close modals
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const rc=document.querySelector('.restart-confirm');if(rc){rc.remove();return;}
    const sk=document.querySelector('.sk-confirm');if(sk){sk.remove();return;}
  }
});
</script>
